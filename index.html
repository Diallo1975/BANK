<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsche Vermögensbank - Mein Konto</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="main-container">
        <div id="login-page" class="page fade-in-up active">
            <div class="card login-card">
                <div class="bank-logo-area">
                    <i class="fas fa-gem bank-icon"></i>
                    <h1>Deutsche Vermögensbank</h1>
                </div>
                <h2>Anmelden</h2>
                <p class="tagline">Ihre Sicherheit hat für uns Priorität.</p>
                <div class="input-group">
                    <i class="fas fa-user icon"></i>
                    <input type="text" id="username" placeholder="Benutzername" value="schneider.frieda">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="password" placeholder="Passwort">
                </div>
                <button id="login-btn" class="btn primary-btn">Einloggen</button>
                <p class="small-link">Passwort vergessen? | Hilfe</p>
            </div>
        </div>

        <div id="account-page" class="page fade-in-up">
            <header class="account-header">
                <h1 class="header-title">Mein Kundenbereich</h1>
                <button id="logout-btn" class="btn secondary-btn">Abmelden <i class="fas fa-sign-out-alt"></i></button>
            </header>
            <div class="account-content">
                <div class="card account-summary-card">
                    <h2 class="card-title"><i class="fas fa-money-check-alt"></i> Kontozusammenfassung</h2>
                    <p class="account-type">Girokonto</p>
                    <p class="account-number">DE76 1234 5678 9012 3456 7890 12</p>
                    <p class="account-holder-name-display">SCHNEIDER FRIEDA</p>
                    <div class="balance-section">
                        <p class="balance-label">Verfügbarer Saldo</p>
                        <div class="balance-display">
                            <span id="animated-balance">0,00 €</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
